version: "3.8"

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: breast-cancer-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=BC@Password123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "BC@Password123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 3s
    networks:
      - breast-cancer-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: breast-cancer-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "8086:80"
    depends_on:
      sql-server:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - breast-cancer-network
      - chatbot-network

volumes:
  sqlserver-data:

networks:
  breast-cancer-network:
    driver: bridge
  chatbot-network:
    external: true
    name: ai-driven-breast-cancer-recurrence-prediction-and-support-system_default
